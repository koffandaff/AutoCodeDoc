site_name: AutoCodeDoc Platform
site_url: https://your-username.github.io/AutoCodeDoc/
site_description: Production-grade API and Architecture Documentation
theme:
  name: material
  features:
    - content.code.copy
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo

plugins:
  - search
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          paths: [backend]
          options:
            docstring_style: google
            show_root_heading: false
            show_bases: false
            show_source: false
            merge_init_into_class: true
  - gen-files:
      scripts:
        - scripts/gen_ref_pages.py
        - scripts/gen_architecture.py
  - literate-nav:
      nav_file: SUMMARY.md
  - section-index
  # - mkdocs-jupyter

markdown_extensions:
  - pymdownx.snippets:
      base_path: ["docs", "."]
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

nav:
  - SUMMARY.md

watch:
  - backend/app
  - scripts
